name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Test
        run: cargo test --locked
      - name: Build release CLI
        run: cargo build --release --locked
